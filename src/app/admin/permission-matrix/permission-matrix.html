<div class="container py-4">

  <mat-card>
    <h3 class="mb-3">Role Permission Matrix</h3>

    <table mat-table [dataSource]="roles" class="mat-elevation-z2" border="1">

      <!-- ROLE COLUMN -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let row">
          {{ row.name }}
        </td>
      </ng-container>

      <!-- PERMISSION COLUMNS -->
      <ng-container *ngFor="let perm of permissions" [matColumnDef]="perm">

        <th mat-header-cell *matHeaderCellDef>
          {{ perm }}
        </th>

        <td mat-cell *matCellDef="let row">

          <mat-slide-toggle
            [checked]="hasPermission(row, perm)"
            (change)="toggle(row, perm)">
          </mat-slide-toggle>

        </td>

      </ng-container>

      <!-- HEADER -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- ROW -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </mat-card>

</div>
