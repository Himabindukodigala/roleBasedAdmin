<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="fw-bold text-center mb-4">Login</h3>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label">Email or Username</label>
              <input type="text" class="form-control" formControlName="emailOrUsername">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password">
            </div>

            <div class="text-danger small mb-3">{{ errorMessage }}</div>

            <button class="btn btn-dark w-100" type="submit">Login</button>
            <!-- <a class="btn btn-link w-100 mt-2" >  -->
            <button class="btn btn-link w-100 mt-2" routerLink="/signup">Don't have an account?Sign up</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
