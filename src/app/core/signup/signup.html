<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="card rounded-4 shadow-sm border-0">
        <div class="card-body p-5">
          <h1 class="h4 fw-bold mb-3">Create account</h1>
          <p class="text-secondary mb-4">Sign up to manage your store or start shopping right away.</p>
          <form>
            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" placeholder="Enter your name" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" class="form-control" placeholder="name@example.com" />
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Create a password" />
            </div>
            <button class="btn btn-primary w-100">Sign up</button>
          </form>
          <div class="text-center mt-4">
            <span class="text-secondary">Already have an account? </span><a routerLink="/login">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
