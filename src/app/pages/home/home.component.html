<div class="container mt-4">

  <div id="carouselExample" class="carousel slide mb-5" data-bs-ride="carousel">
    
    <div class="carousel-inner rounded shadow-sm">

      <div class="carousel-item active">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
             class="d-block w-100 banner-img">
      </div>


      <div class="carousel-item">

        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b"
             class="d-block w-100 banner-img">
      </div>

      <div class="carousel-item">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b"
             class="d-block w-100 banner-img">
      </div>

    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

 
  <div class="text-center mb-4">
    <h2 class="fw-bold">Featured Products</h2>
    <p class="text-muted">Top picks for you</p>
  </div>

 
  <div class="row g-4">

    <div class="col-md-3" *ngFor="let p of products">

      <div class="card h-100 shadow-sm">

        <img [src]="p.imageUrl"
             class="card-img-top product-img"
             alt="product">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">{{ p.name }}</h5>

          <p class="text-muted small">
            {{ p.description }}
          </p>

          <h6 class="fw-bold mb-3">₹ {{ p.price }}</h6>

          <a [routerLink]="['/products', p.id]"
             class="btn btn-primary mt-auto">
            View Details
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
