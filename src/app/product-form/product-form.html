<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm p-4">

        <h4 class="text-center mb-4 fw-bold">
          {{ isEdit ? 'Edit Product' : 'Add Product' }}
        </h4>

        <form [formGroup]="form" (ngSubmit)="submit()">

          <div class="mb-3">
            <input class="form-control" placeholder="Image URL" formControlName="imageUrl">
          </div>

          <div class="mb-3">
            <input class="form-control" placeholder="Item Name" formControlName="name">
          </div>

          <div class="mb-3">
            <textarea class="form-control" placeholder="Description" formControlName="description"></textarea>
          </div>

          <div class="mb-3">
            <input type="number" class="form-control" placeholder="Price" formControlName="price">
          </div>

          <div class="mb-3">
            <input type="number" class="form-control" placeholder="Stock" formControlName="stock">
          </div>

          <div class="mb-3">
            <input class="form-control" placeholder="Category Id" formControlName="categoryId">
          </div>

          <button class="btn btn-success w-100">
            Save Changes
          </button>

        </form>

      </div>

    </div>
  </div>

</div>
